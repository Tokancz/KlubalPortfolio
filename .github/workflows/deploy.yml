name: Deploy to GitHub Pages

on:
  # Rebuild and deploy whenever main changes
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Avoid overlapping deploys clobbering each other
concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: write # peaceiris needs this to push the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Keep the custom domain on every deploy
          cname: klubal.art
